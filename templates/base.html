<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Team Shunte Chai{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container nav-container">
            <a href="{% url 'home' %}" class="logo">
                <img src="{% static 'images/logo.png' %}" alt="Team Shunte Chai Logo" class="nav-logo">
            </a>
            <div class="nav-links">
                <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
                <a href="{% url 'about' %}" class="{% if request.resolver_match.url_name == 'about' %}active{% endif %}">About</a>
                <a href="{% url 'achievements' %}" class="{% if request.resolver_match.url_name == 'achievements' %}active{% endif %}">Achievements</a>
                <a href="{% url 'resources' %}" class="{% if request.resolver_match.url_name == 'resources' %}active{% endif %}">Resources</a>
                <a href="{% url 'team' %}" class="{% if request.resolver_match.url_name == 'team' %}active{% endif %}">Team</a>
                <a href="{% url 'contact' %}" class="{% if request.resolver_match.url_name == 'contact' %}active{% endif %}">Contact</a>
                <a href="{% url 'contact' %}" class="btn btn-primary">Join Us</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-info">
                <img src="{% static 'images/logo.png' %}" alt="Team Shunte Chai Logo" class="footer-logo">
                <p>A safe space for your mind. Empowering youths through accessible mental health support.</p>
            </div>
            <div class="footer-links">
                <h4>Quick Links</h4>
                <a href="{% url 'home' %}">Home</a>
                <a href="{% url 'about' %}">About Us</a>
                <a href="{% url 'team' %}">Our Team</a>
                <a href="{% url 'contact' %}">Contact</a>
            </div>
            <div class="footer-social">
                <h4>Follow Us</h4>
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-linkedin-in"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Team Shunte Chai. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
